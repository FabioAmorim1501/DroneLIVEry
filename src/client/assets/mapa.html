<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>DroneLIVEry Operations Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #FFF; }
        #map { height: 100vh; width: 100vw; }
        .drone-popup { text-align: center; }
        .drone-popup b { font-size: 16px; color: #1E293B; }
        .drone-popup span { display: block; margin-top: 5px; font-weight: bold; padding: 3px; border-radius: 4px; }
        .bat-safe { background: #DCFCE7; color: #15803D; }
        .bat-warn { background: #FEF9C3; color: #A16207; }
        .bat-danger { background: #FEE2E2; color: #B91C1C; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var map = L.map('map', {zoomControl: false}).setView([-23.5505, -46.6333], 12); // SP Central
        L.control.zoom({position: 'bottomright'}).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap contributors © CARTO',
            maxZoom: 19
        }).addTo(map);

        var markers = [];
        var polylines = [];

        // Delphi Injected Function
        // points = [ {lat: -23.5, lng: -46.6, label: "Hangar", battery: 100}, 
        //            {lat: -23.6, lng: -46.5, label: "Destino 1", battery: 80} ]
        function drawMission(pointsJson) {
            var points = JSON.parse(pointsJson);
            
            markers.forEach(function(m) { map.removeLayer(m); });
            polylines.forEach(function(p) { map.removeLayer(p); });
            markers = [];
            polylines = [];
            
            if (!points || points.length === 0) return "NO_DATA";

            var latLngs = [];
            
            points.forEach(function(p, index) {
                var latLng = [p.lat, p.lng];
                latLngs.push(latLng);
                
                // Color Picker for Battery
                var batClass = 'bat-safe';
                if (p.battery < 40 && p.battery >= 20) batClass = 'bat-warn';
                if (p.battery < 20) batClass = 'bat-danger';

                var batStr = p.battery !== null ? '<span class="' + batClass + '">🔋 Bateria: ' + p.battery.toFixed(1) + '%</span>' : '';
                var isHub = (index === 0 || index === points.length - 1);
                var iconUrl = isHub ? 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-black.png' : 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png';

                var colorIcon = new L.Icon({
                    iconUrl: iconUrl,
                    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                    iconSize: [25, 41],
                    iconAnchor: [12, 41],
                    popupAnchor: [1, -34],
                    shadowSize: [41, 41]
                });

                var marker = L.marker(latLng, {icon: colorIcon}).addTo(map);
                marker.bindPopup('<div class="drone-popup"><b>' + p.label + '</b>' + batStr + '</div>');
                if(index === points.length - 1) marker.openPopup(); // Open last (usually hub return)
                markers.push(marker);
            });

            // Draw line
            if (latLngs.length > 1) {
                var line = L.polyline(latLngs, {color: '#3B82F6', weight: 4, opacity: 0.8, dashArray: '10, 10'}).addTo(map);
                polylines.push(line);
                
                // Animate boundaries
                map.fitBounds(line.getBounds(), {padding: [50, 50]});
            } else {
                map.setView(latLngs[0], 15);
            }

            return "SUCCESS";
        }

        // Test Call
        // drawMission('[{"lat":-23.55,"lng":-46.63,"label":"HUB Central","battery":100},{"lat":-23.58,"lng":-46.68,"label":"Av. Faria Lima","battery":84},{"lat":-23.55,"lng":-46.63,"label":"Retorno HUB","battery":68}]');
    </script>
</body>
</html>
